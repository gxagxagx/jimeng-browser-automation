interface:
  display_name: "JiMeng Browser"
  short_description: "Automate JiMeng and Seedance creation in browser"
  default_prompt: "Use $jimeng-browser-automation to ensure JiMeng login, submit JiMeng image tasks or Seedance/JiMeng video tasks, keep structured options such as model, aspect, duration, resolution, and reference mode in flags instead of the prompt, but keep JiMeng reference-binding tokens inside the prompt when they refer to uploaded materials, such as @图片1 in 全能参考 and @主体 or @主体1/@主体2 in 主体参考, then check status by record-id, cancel queued video tasks when asked, and download finished results."
