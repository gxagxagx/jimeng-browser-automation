interface:
  display_name: "JiMeng Browser"
  short_description: "Automate JiMeng, Seedance, and canvas projects in browser"
  default_prompt: "Use $jimeng-browser-automation to ensure JiMeng login, submit JiMeng image tasks or Seedance/JiMeng video tasks, create or open canvas projects when needed, prompt inside a canvas project to request an image or video, keep structured options such as model, aspect, duration, resolution, and reference mode in flags instead of the prompt where the UI exposes them, and keep JiMeng reference-binding tokens inside the prompt when they refer to uploaded materials, such as @图片1 in 全能参考, then check status by record-id, cancel queued video tasks when asked, and download finished results."
